name: dar_plus
description: Proyecto Flutter Dar+
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI/UX
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.7

  # State Management
  provider: ^6.0.5

  # Local Storage
  shared_preferences: ^2.2.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
